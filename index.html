<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Perfil - Victor Hugo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        h2 {
            color: #34495e;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 5px;
        }

        hr {
            border: none;
            height: 1px;
            background: #ddd;
            margin: 20px 0;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: #f9fafb;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
        }

        p {
            line-height: 1.6;
            color: #555;
        }

        strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Victor Hugo</h1>
        <hr>

        <h2>Informações Pessoais</h2>
        <ul>
            <li><strong>Idade:</strong> 18 anos</li>
            <li><strong>Telefone:</strong> (47) 98825-6630</li>
            <li><strong>Cidade:</strong> Brusque - SC</li>
        </ul>

        <h2>Sobre Mim</h2>
        <p>
            Sou de Brusque (SC), gosto muito da área e digamos que eu seja um entusiasta.
            Sempre gostei de tecnologia.
        </p>

        <h2>Formação</h2>
        <p>
            Atualmente estou cursando Sistemas de Informação na UNIFEBE.
        </p>
    </div>

</body>
</html>
